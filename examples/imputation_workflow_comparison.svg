<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 16px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .lane-title { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .label { font: 15px Arial, "Microsoft YaHei", sans-serif; fill: #253041; }
      .small { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .tiny { font: 12px Arial, "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #cfd6e3; stroke-width: 1.4; rx: 8; }
      .input { fill: #fff8e8; stroke: #e4b84d; }
      .knn { fill: #eef6ff; stroke: #4d8fd6; }
      .material { fill: #edf8f1; stroke: #52a46b; }
      .iterative { fill: #f4efff; stroke: #8a68d8; }
      .warn { fill: #fff1f2; stroke: #e46a78; }
      .note { fill: #f9fafb; stroke: #d1d5db; }
      .arrow { stroke: #526072; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .arrow-knn { stroke: #2f72bd; }
      .arrow-material { stroke: #308b4c; }
      .arrow-iterative { stroke: #7652c4; }
      .dash { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrowhead" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#526072"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="820"/>
  <text x="640" y="52" text-anchor="middle" class="title">常规 KNN 填充 vs 项目 Material / Iterative 填充流程对比</text>
  <text x="640" y="82" text-anchor="middle" class="subtitle">目标：在真实电解质小样本数据中，比较不同缺失值恢复路径对下游电导率预测精度的影响</text>

  <rect x="54" y="126" width="250" height="596" class="box input"/>
  <text x="179" y="164" text-anchor="middle" class="lane-title">输入数据</text>
  <rect x="82" y="196" width="194" height="74" class="box"/>
  <text x="179" y="224" text-anchor="middle" class="label">真实电解质数据</text>
  <text x="179" y="249" text-anchor="middle" class="small">温度 / 溶剂比例 / 盐浓度</text>
  <rect x="82" y="306" width="194" height="74" class="box"/>
  <text x="179" y="334" text-anchor="middle" class="label">人工制造缺失</text>
  <text x="179" y="359" text-anchor="middle" class="small">MCAR: 10% / 20% / 30%</text>
  <rect x="82" y="416" width="194" height="74" class="box"/>
  <text x="179" y="444" text-anchor="middle" class="label">保持目标列完整</text>
  <text x="179" y="469" text-anchor="middle" class="small">只缺失特征，不泄漏电导率</text>
  <rect x="82" y="544" width="194" height="104" class="box note"/>
  <text x="179" y="574" text-anchor="middle" class="label">统一评估</text>
  <text x="179" y="602" text-anchor="middle" class="small">RandomForestRegressor</text>
  <text x="179" y="626" text-anchor="middle" class="small">Ridge</text>

  <rect x="355" y="126" width="250" height="596" class="box knn"/>
  <text x="480" y="164" text-anchor="middle" class="lane-title">常规 KNN 填充</text>
  <rect x="383" y="196" width="194" height="74" class="box"/>
  <text x="480" y="224" text-anchor="middle" class="label">标准化特征空间距离</text>
  <text x="480" y="249" text-anchor="middle" class="small">找相似配方 / 相似温度样本</text>
  <rect x="383" y="306" width="194" height="74" class="box"/>
  <text x="480" y="334" text-anchor="middle" class="label">选 k 个近邻</text>
  <text x="480" y="359" text-anchor="middle" class="small">邻居观测值加权/平均补全</text>
  <rect x="383" y="416" width="194" height="74" class="box"/>
  <text x="480" y="444" text-anchor="middle" class="label">一次性输出完整矩阵</text>
  <text x="480" y="469" text-anchor="middle" class="small">局部连续结构强时很稳</text>
  <rect x="383" y="544" width="194" height="104" class="box note"/>
  <text x="480" y="574" text-anchor="middle" class="label">优势 / 局限</text>
  <text x="480" y="602" text-anchor="middle" class="small">优势：简单、稳、强基线</text>
  <text x="480" y="626" text-anchor="middle" class="small">局限：不懂材料机理</text>

  <rect x="676" y="126" width="250" height="596" class="box material"/>
  <text x="801" y="164" text-anchor="middle" class="lane-title">Material 填充</text>
  <rect x="704" y="196" width="194" height="74" class="box"/>
  <text x="801" y="224" text-anchor="middle" class="label">构造材料分组</text>
  <text x="801" y="249" text-anchor="middle" class="small">盐体系 / 溶剂体系 / 温度段</text>
  <rect x="704" y="306" width="194" height="74" class="box"/>
  <text x="801" y="334" text-anchor="middle" class="label">组内中位数填充</text>
  <text x="801" y="359" text-anchor="middle" class="small">优先使用同类材料统计量</text>
  <rect x="704" y="416" width="194" height="74" class="box"/>
  <text x="801" y="444" text-anchor="middle" class="label">全局中位数兜底</text>
  <text x="801" y="469" text-anchor="middle" class="small">组内样本太少时防止失败</text>
  <rect x="704" y="544" width="194" height="104" class="box warn"/>
  <text x="801" y="574" text-anchor="middle" class="label">当前瓶颈</text>
  <text x="801" y="602" text-anchor="middle" class="small">分组太粗会压平连续变化</text>
  <text x="801" y="626" text-anchor="middle" class="small">需要更强材料语义分组</text>

  <rect x="977" y="126" width="250" height="596" class="box iterative"/>
  <text x="1102" y="164" text-anchor="middle" class="lane-title">Iterative 填充</text>
  <rect x="1005" y="196" width="194" height="74" class="box"/>
  <text x="1102" y="224" text-anchor="middle" class="label">KNN 初始化</text>
  <text x="1102" y="249" text-anchor="middle" class="small">先给缺失值一个可用初值</text>
  <rect x="1005" y="306" width="194" height="74" class="box"/>
  <text x="1102" y="334" text-anchor="middle" class="label">逐列训练 ExtraTrees</text>
  <text x="1102" y="359" text-anchor="middle" class="small">用其他特征预测该列缺失值</text>
  <rect x="1005" y="416" width="194" height="74" class="box"/>
  <text x="1102" y="444" text-anchor="middle" class="label">多轮迭代更新</text>
  <text x="1102" y="469" text-anchor="middle" class="small">直到变化收敛或达到 max_iter</text>
  <rect x="1005" y="544" width="194" height="104" class="box warn"/>
  <text x="1102" y="574" text-anchor="middle" class="label">当前瓶颈</text>
  <text x="1102" y="602" text-anchor="middle" class="small">小样本易过拟合 / 误差传播</text>
  <text x="1102" y="626" text-anchor="middle" class="small">需要尺度处理和物理约束</text>

  <path d="M276 233 C318 233 330 233 383 233" class="arrow arrow-knn"/>
  <path d="M276 343 C502 343 511 233 704 233" class="arrow arrow-material"/>
  <path d="M276 453 C667 453 675 233 1005 233" class="arrow arrow-iterative"/>
  <path d="M480 270 L480 306" class="arrow arrow-knn"/>
  <path d="M480 380 L480 416" class="arrow arrow-knn"/>
  <path d="M801 270 L801 306" class="arrow arrow-material"/>
  <path d="M801 380 L801 416" class="arrow arrow-material"/>
  <path d="M1102 270 L1102 306" class="arrow arrow-iterative"/>
  <path d="M1102 380 L1102 416" class="arrow arrow-iterative"/>

  <rect x="98" y="748" width="1084" height="42" class="box note"/>
  <text x="640" y="775" text-anchor="middle" class="label">实验结论：当前真实数据 + MCAR 缺失下，KNN 受益于连续配方空间；你的方法要超过 KNN，需要更材料化的分组、尺度处理、参数约束和 CEP 物理先验。</text>
</svg>
